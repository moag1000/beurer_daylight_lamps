# Services for Beurer Daylight Lamps

apply_preset:
  name: Apply preset
  description: Apply a predefined lighting preset to the lamp
  target:
    entity:
      integration: beurer_daylight_lamps
      domain: light
  fields:
    preset:
      name: Preset
      description: The preset to apply
      required: true
      selector:
        select:
          options:
            - "daylight_therapy"
            - "relax"
            - "focus"
            - "reading"
            - "warm_cozy"
            - "cool_bright"
            - "sunset"
            - "night_light"
            - "energize"

send_raw_command:
  name: Send raw command (Expert)
  description: "Send a raw BLE command to the lamp. For reverse engineering and testing. Format: hex bytes separated by spaces (e.g., '33 01 1E' for 30-min timer)"
  target:
    entity:
      integration: beurer_daylight_lamps
      domain: light
  fields:
    command:
      name: Command bytes
      description: "Hex bytes to send (e.g., '33 01 1E' for 30min timer). Known: 30=status, 31=brightness, 32=color, 33=timer_value, 34=effect, 35=off, 36=timer_cancel, 37=mode, 38=timer_toggle. Unknown: 39, 3E, 3F"
      required: true
      example: "33 01 1E"
      selector:
        text:

set_timer:
  name: Set Timer
  description: "Set an auto-off timer on the lamp. Works in both White and RGB mode. Range: 1-120 minutes."
  target:
    entity:
      integration: beurer_daylight_lamps
      domain: light
  fields:
    minutes:
      name: Minutes
      description: "Timer duration in minutes (1-120). Popular values: 15, 21, 30, 60 minutes for therapy sessions."
      required: true
      selector:
        number:
          min: 1
          max: 120
          step: 1
          unit_of_measurement: "min"
          mode: slider

start_sunrise:
  name: Start Sunrise Simulation
  description: "Start a gradual sunrise simulation. The light slowly increases brightness and shifts from warm to cool white, mimicking natural sunrise. NOTE: This is a lifestyle/wellness feature, not a medical device."
  target:
    entity:
      integration: beurer_daylight_lamps
      domain: light
  fields:
    duration:
      name: Duration
      description: "Duration of the sunrise in minutes (1-60)"
      default: 15
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: "min"
          mode: slider
    profile:
      name: Profile
      description: "Sunrise profile determining color temperature and brightness curves"
      default: "natural"
      selector:
        select:
          options:
            - label: "Gentle - Very slow, warm start (2200K to 3500K)"
              value: "gentle"
            - label: "Natural - Natural sunrise simulation (2700K to 5000K)"
              value: "natural"
            - label: "Energize - Fast, cool light for alertness (3500K to 6500K)"
              value: "energize"
            - label: "Therapy - Optimized for light exposure (2700K to 5300K)"
              value: "therapy"

start_sunset:
  name: Start Sunset Simulation
  description: "Start a gradual sunset simulation. The light slowly decreases brightness and shifts to warm tones, helping prepare for sleep. NOTE: This is a lifestyle/wellness feature, not a medical device."
  target:
    entity:
      integration: beurer_daylight_lamps
      domain: light
  fields:
    duration:
      name: Duration
      description: "Duration of the sunset in minutes (1-60)"
      default: 30
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: "min"
          mode: slider
    end_brightness:
      name: End Brightness
      description: "Final brightness percentage (0 = turn off completely)"
      default: 0
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider

stop_simulation:
  name: Stop Simulation
  description: "Stop any running sunrise or sunset simulation. The light will remain at its current state."
  target:
    entity:
      integration: beurer_daylight_lamps
      domain: light

set_alarm:
  name: Set Alarm (WL90)
  description: "Configure an alarm on a WL90 Wake-up Light. Supports sunrise simulation, weekday selection, tone, and snooze. Only works with WL90 devices."
  target:
    entity:
      integration: beurer_daylight_lamps
      domain: light
  fields:
    slot:
      name: Alarm slot
      description: "Alarm slot number (0, 1, or 2). The WL90 has 3 independent alarm slots."
      required: true
      selector:
        number:
          min: 0
          max: 2
          step: 1
          mode: box
    enabled:
      name: Enabled
      description: "Enable or disable this alarm"
      required: true
      selector:
        boolean:
    hour:
      name: Hour
      description: "Alarm hour (24-hour format)"
      default: 7
      selector:
        number:
          min: 0
          max: 23
          step: 1
          mode: box
    minute:
      name: Minute
      description: "Alarm minute"
      default: 0
      selector:
        number:
          min: 0
          max: 59
          step: 1
          mode: box
    days:
      name: Days
      description: "Comma-separated day names (e.g., Mon,Tue,Wed,Thu,Fri)"
      default: "Mon,Tue,Wed,Thu,Fri"
      selector:
        text:
    tone:
      name: Tone
      description: "Alarm tone"
      default: 0
      selector:
        select:
          options:
            - label: "Buzzer"
              value: "0"
            - label: "Radio (WL90 only)"
              value: "1"
            - label: "Melody 1"
              value: "2"
            - label: "Melody 2"
              value: "3"
            - label: "Melody 3"
              value: "4"
            - label: "Melody 4"
              value: "5"
            - label: "Melody 5"
              value: "6"
            - label: "Melody 6"
              value: "7"
            - label: "Melody 7"
              value: "8"
            - label: "Melody 8"
              value: "9"
            - label: "Melody 9"
              value: "10"
            - label: "Melody 10"
              value: "11"
    volume:
      name: Volume
      description: "Alarm volume"
      default: 5
      selector:
        number:
          min: 0
          max: 10
          step: 1
          mode: slider
    snooze:
      name: Snooze
      description: "Snooze duration in minutes"
      default: 10
      selector:
        select:
          options:
            - label: "1 minute"
              value: "1"
            - label: "2 minutes"
              value: "2"
            - label: "5 minutes"
              value: "5"
            - label: "10 minutes"
              value: "10"
            - label: "20 minutes"
              value: "20"
            - label: "30 minutes"
              value: "30"
    sunrise_enabled:
      name: Sunrise simulation
      description: "Enable sunrise light simulation before alarm"
      default: true
      selector:
        boolean:
    sunrise_time:
      name: Sunrise start
      description: "Minutes before alarm to start sunrise simulation"
      default: 20
      selector:
        number:
          min: 2
          max: 60
          step: 1
          unit_of_measurement: "min"
          mode: slider
    sunrise_brightness:
      name: Sunrise brightness
      description: "Maximum sunrise brightness"
      default: 50
      selector:
        number:
          min: 1
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider
